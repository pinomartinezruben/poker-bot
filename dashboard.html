
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poker Analytics Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
            line-height: 1.5;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        h2 {
            font-size: 18px;
            font-weight: 500;
            margin-top: 40px;
            margin-bottom: 20px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .chart-container {
            position: relative;
            margin-bottom: 40px;
            background: #fff;
            padding: 20px;
            border: 1px solid #efefef;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f9f9f9;
            font-weight: 600;
        }
        tr:hover {
            background-color: #fcfcfc;
        }
        .winner-cell {
            font-weight: 600;
            color: #2c7be5;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .summary-card {
            border: 1px solid #eee;
            padding: 20px;
            text-align: center;
        }
        .summary-card .label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .summary-card .value {
            font-size: 24px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Poker Performance Analysis</h1>
        
        <div class="summary-grid">
            <div class="summary-card">
                <div class="label">Total Hands</div>
                <div class="value" id="stat-hands">0</div>
            </div>
            <div class="summary-card">
                <div class="label">Average Pot Size</div>
                <div class="value" id="stat-avg-pot">$0</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Hands Witnessed</div>
                <div class="value" id="stat-total-volume">0</div>
            </div>
        </div>

        <h2>Stack Size Progression</h2>
        <div class="chart-container">
            <canvas id="stackChart"></canvas>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
            <div>
                <h2>Win Count by Player</h2>
                <div class="chart-container">
                    <canvas id="winChart"></canvas>
                </div>
            </div>
            <div>
                <h2>Hand Strength Frequency</h2>
                <div class="chart-container">
                    <canvas id="strengthChart"></canvas>
                </div>
            </div>
        </div>

        <h2>Detailed Game Logs</h2>
        <table>

                    <th>Hand Description</th>
                    <th>Tokens Won</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

            });

                data: finalData,
